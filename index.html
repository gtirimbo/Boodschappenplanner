<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F7F5EF">
<title>Boodschappenplanner</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F7F5EF; --ink:#15161B; --blue:#1449C4; --red:#D91E2B;
    --yellow:#F5C400; --grey:#8A8D94; --line:#DDD9CE;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body {
    background:var(--bg); color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif; font-size:16px;
    padding:16px 16px calc(24px + env(safe-area-inset-bottom));
    max-width:560px; margin:0 auto;
  }
  h1 { font-family:'Archivo Black',sans-serif; font-size:1.35rem; }
  .brand { display:flex; align-items:center; gap:8px; margin:8px 0 20px; }
  .sq { width:12px; height:12px; flex:none; }
  .card { background:#fff; border:2px solid var(--ink); padding:20px; }
  .progress { display:flex; gap:5px; margin-bottom:24px; }
  .progress div { height:8px; flex:1; background:var(--line); transition:background .3s; }
  .stepnum { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--grey); margin-bottom:6px; }
  h2 { font-size:1.15rem; margin-bottom:16px; }
  .hint { font-size:.85rem; color:var(--grey); margin:-10px 0 16px; }
  button { font-family:inherit; font-size:inherit; border:none; background:none; cursor:pointer; color:inherit; }

  .storegrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .storebtn { border:2px solid var(--ink); background:#fff; padding:14px 12px; text-align:left;
    font-weight:600; font-size:.95rem; min-height:52px; display:flex; align-items:center; justify-content:space-between; }

  .budget { font-family:'IBM Plex Mono',monospace; font-size:2.2rem; font-weight:600; color:var(--blue); margin-bottom:18px; }
  input[type=range] { -webkit-appearance:none; appearance:none; width:100%; height:4px; background:var(--ink); }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:28px; height:28px; border-radius:0;
    background:var(--red); border:2px solid var(--ink); cursor:pointer; margin-top:-1px; }
  input[type=range]::-moz-range-thumb { width:28px; height:28px; border-radius:0;
    background:var(--red); border:2px solid var(--ink); }
  .range-labels { display:flex; justify-content:space-between; font-size:.75rem; color:var(--grey); margin-top:8px; }

  .daygrid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  .daybtn { border:2px solid var(--ink); background:#fff; aspect-ratio:1; font-weight:600; font-size:.85rem; }
  .daybtn.on { background:var(--yellow); }

  .dietbtn { border:2px solid var(--ink); background:#fff; padding:16px; text-align:left; width:100%; margin-bottom:12px; }
  .dietbtn .t { font-weight:600; font-size:1.05rem; margin-bottom:4px; }
  .dietbtn .d { font-size:.85rem; opacity:.75; }
  .dietbtn.on { background:var(--ink); color:#fff; }

  .nav { display:flex; justify-content:space-between; align-items:center; margin-top:24px; }
  .back { padding:12px 8px; font-weight:500; font-size:.9rem; }
  .next { background:var(--ink); color:#fff; padding:14px 22px; font-weight:600; font-size:.85rem;
    letter-spacing:.08em; text-transform:uppercase; }
  .next:disabled { opacity:.35; }

  .banner { background:var(--ink); color:#fff; padding:14px; margin-bottom:16px; }
  .banner .l { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; font-weight:600; margin-bottom:4px; }
  .banner .v { font-family:'IBM Plex Mono',monospace; font-size:.85rem; }

  .dayhead { display:flex; justify-content:space-between; align-items:baseline; margin:20px 0 8px; }
  .dayhead .n { font-size:.85rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; }
  .dayhead .m { font-family:'IBM Plex Mono',monospace; font-size:.7rem; color:var(--grey); }

  .mealcard { background:#fff; border:2px solid var(--ink); padding:14px; margin-bottom:10px; }
  .mealtag { font-size:.6rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase; padding:4px 8px; }
  .mealtop { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .mealtime { font-size:.72rem; color:var(--grey); }
  .mealname { font-weight:600; margin-bottom:6px; }
  .macros { display:inline-flex; border:1px solid var(--line); margin-bottom:8px; }
  .macros div { padding:4px 8px; border-right:1px solid var(--line); text-align:center; }
  .macros div:last-child { border-right:none; }
  .macros b { display:block; font-family:'IBM Plex Mono',monospace; font-size:.8rem; font-weight:600; }
  .macros span { font-size:.55rem; letter-spacing:.08em; text-transform:uppercase; color:var(--grey); }
  details summary { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--grey);
    cursor:pointer; padding:4px 0; list-style:none; }
  details summary::before { content:"+ "; }
  details[open] summary::before { content:"– "; }
  details ol { margin:6px 0 4px 20px; font-size:.88rem; color:#4A4C52; }
  details li { margin-bottom:6px; }

  .receipt { background:#fff; border:2px solid var(--ink); padding:16px; font-family:'IBM Plex Mono',monospace; margin-bottom:16px; }
  .receipt .head { display:flex; align-items:center; gap:8px; font-size:.7rem; font-weight:600;
    letter-spacing:.12em; text-transform:uppercase; }
  .receipt .sub { font-size:.6rem; color:var(--grey); margin:2px 0 12px; }
  .rline { display:flex; justify-content:space-between; gap:8px; font-size:.72rem; padding:3px 0; }
  .rline .g { color:var(--grey); }
  .rtotal { border-top:2px solid var(--ink); margin-top:10px; padding-top:10px;
    display:flex; justify-content:space-between; font-weight:600; font-size:1rem; }
  .verdict { font-size:.72rem; padding:8px; margin-top:10px; display:flex; gap:6px; }
  .verdict.ok { background:#EAF3E4; color:#2E6B1F; }
  .verdict.over { background:#FDECEC; color:var(--red); }
  .barcode { display:flex; gap:2px; height:26px; margin-top:14px; }
  .barcode i { background:var(--ink); width:1px; }
  .barcode i:nth-child(3n) { width:2px; }
  .foot { font-size:.68rem; color:var(--grey); margin:10px 2px 20px; }
  .restart { border:2px solid var(--ink); padding:12px 16px; font-weight:500; font-size:.9rem; width:100%; margin-top:8px; }
  .dashed { border-top:1px dashed var(--ink); padding-top:10px; }
</style>
</head>

const SNAPSHOT_DATE = "2026-07-07";
const { INGREDIENTS, STORES, RECIPES, MEALS, DAYS } = DATA;

// ---------------------------------------------------------------------------
// Live prices: try these URLs in order; first one that answers wins.
// "prices.json" = a file published next to this page (e.g. by the weekly
// GitHub Action); "/api/prices" = the FastAPI backend. If both fail (offline,
// pure standalone file), the baked-in snapshot below is used.
// ---------------------------------------------------------------------------
const PRICE_URLS = ["prices.json", "/api/prices"];
let priceInfo = { source: "snapshot", date: SNAPSHOT_DATE };

async function loadLivePrices(){
  for (const url of PRICE_URLS){
    try {
      const r = await fetch(url, { cache: "no-store" });
      if (!r.ok) continue;
      const d = await r.json();
      if (!d || !d.ingredients) continue;
      let applied = 0;
      for (const [id, entry] of Object.entries(d.ingredients)){
        if (!INGREDIENTS[id]) continue;
        for (const s of STORES){
          if (typeof entry[s.id] === "number"){ INGREDIENTS[id][s.id] = entry[s.id]; applied++; }
        }
      }
      if (applied > 0){
        priceInfo = { source: url, date: (d.updated_at || "").slice(0,10) || "unknown" };
        render();
      }
      return;
    } catch (e) { /* try next url */ }
  }
}

const state = { step:0, market:null, budget:80, days:[], diet:null };
const fmt = n => "€ " + n.toFixed(2);
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;");
const price = (id, m) => INGREDIENTS[id][m];
const recipeCost = (r, m) => Object.entries(r.ingredients).reduce((s,[id,f]) => s + f*price(id,m), 0);
const PROGRESS = ["var(--blue)","var(--red)","var(--yellow)","var(--ink)"];

function pickMealPlan(diet, numDays, market){
  const plan = {};
  MEALS.forEach(({key}) => {
    const sorted = RECIPES.filter(r => r.diet===diet && r.meal===key)
      .sort((a,b) => recipeCost(a,market)-recipeCost(b,market));
    plan[key] = Array.from({length:numDays}, (_,i) => {
      const lap = Math.floor(i/sorted.length);
      return sorted[(i+lap)%sorted.length];
    });
  });
  return plan;
}

function buildList(picks, market){
  const totals = {};
  picks.forEach(r => Object.entries(r.ingredients).forEach(([id,f]) => totals[id]=(totals[id]||0)+f));
  const items = Object.entries(totals).map(([id,f]) => {
    const packs = Math.ceil(f-1e-9);
    return { id, name:INGREDIENTS[id].name, pack:INGREDIENTS[id].pack, packs, lineTotal:packs*price(id,market) };
  }).sort((a,b) => a.name.localeCompare(b.name));
  return { items, grandTotal: items.reduce((s,i)=>s+i.lineTotal,0) };
}

function priceNote(){
  return priceInfo.source === "snapshot"
    ? `Prices via the checkjebon.nl open dataset (snapshot of ${priceInfo.date}).`
    : `Prices via the checkjebon.nl open dataset — live, updated ${priceInfo.date}.`;
}
function progressHTML(){
  return '<div class="progress">' + PROGRESS.map((c,i) =>
    `<div style="background:${state.step>=i?c:'var(--line)'}"></div>`).join('') + '</div>';
}
function navHTML(backStep, disabled, label){
  return `<div class="nav">
    ${backStep!==null?`<button class="back" onclick="go(${backStep})">‹ Back</button>`:'<span></span>'}
    <button class="next" ${disabled?'disabled':''} onclick="go(${state.step+1})">${label||'Next'} ›</button>
  </div>`;
}
function macroHTML(m){
  return `<div class="macros">
    <div><b>${m.kcal}</b><span>kcal</span></div>
    <div><b>${m.protein}g</b><span>prot</span></div>
    <div><b>${m.carbs}g</b><span>carb</span></div>
    <div><b>${m.fat}g</b><span>fat</span></div>
  </div>`;
}

function render(){
  const app = document.getElementById('app');
  const s = state;
  if (s.step === 0){
    app.innerHTML = `<div class="card">${progressHTML()}
      <div class="stepnum">Step 1 of 4</div>
      <h2>Which supermarket do you shop at?</h2>
      <div class="storegrid">${STORES.map(m => `
        <button class="storebtn" onclick="setMarket('${m.id}')"
          style="${s.market===m.id?`background:${m.accent};color:${m.text};`:''}">
          ${m.name}${s.market===m.id?' ✓':''}
        </button>`).join('')}
      </div>
      <p class="foot" style="margin-top:12px">${priceNote()}</p>
      ${navHTML(null, !s.market)}
    </div>`;
  } else if (s.step === 1){
    app.innerHTML = `<div class="card">${progressHTML()}
      <div class="stepnum">Step 2 of 4</div>
      <h2>What's your weekly budget?</h2>
      <p class="hint">Covers breakfast, lunch and dinner on your cooking days.</p>
      <div class="budget" id="budgetVal">${fmt(s.budget)}</div>
      <input type="range" min="0" max="200" step="5" value="${s.budget}"
        oninput="state.budget=+this.value;document.getElementById('budgetVal').textContent=fmt(state.budget)">
      <div class="range-labels"><span>€ 0</span><span>€ 200</span></div>
      ${navHTML(0, false)}
    </div>`;
  } else if (s.step === 2){
    app.innerHTML = `<div class="card">${progressHTML()}
      <div class="stepnum">Step 3 of 4</div>
      <h2>Which days do you want to cook?</h2>
      <div class="daygrid">${DAYS.map(d => `
        <button class="daybtn ${s.days.includes(d.key)?'on':''}" onclick="toggleDay('${d.key}')" title="${d.full}">${d.label}</button>`).join('')}
      </div>
      <p class="hint" style="margin:12px 0 0">${s.days.length} day${s.days.length!==1?'s':''} × 3 meals = ${s.days.length*3} recipes</p>
      ${navHTML(1, s.days.length===0)}
    </div>`;
  } else if (s.step === 3){
    const opts = [
      { id:'basic', n:'Basic Healthy', d:'Balanced everyday meals — veg, grains, legumes, some meat and fish. Roughly 1,300–1,500 kcal across the three meals.' },
      { id:'protein', n:'High Protein', d:'Meat, fish, eggs, dairy and legumes lead every meal. Roughly 120–150g protein per day.' }];
    app.innerHTML = `<div class="card">${progressHTML()}
      <div class="stepnum">Step 4 of 4</div>
      <h2>What kind of diet?</h2>
      ${opts.map(o => `<button class="dietbtn ${s.diet===o.id?'on':''}" onclick="setDiet('${o.id}')">
        <div class="t">${o.n}</div><div class="d">${o.d}</div></button>`).join('')}
      ${navHTML(2, !s.diet, 'Generate plan')}
    </div>`;
  } else {
    renderPlan(app);
  }
  window.scrollTo(0,0);
}

function renderPlan(app){
  const s = state;
  const numDays = s.days.length;
  const mealPlan = pickMealPlan(s.diet, numDays, s.market);
  const dayList = DAYS.filter(d => s.days.includes(d.key));
  const dayPlans = dayList.map((d,i) => ({ day:d, meals:MEALS.map(m => ({meal:m, recipe:mealPlan[m.key][i]})) }));
  const allPicks = dayPlans.flatMap(dp => dp.meals.map(x => x.recipe));
  const { items, grandTotal } = buildList(allPicks, s.market);
  const dailyTotals = dayPlans.map(dp => dp.meals.reduce((a,{recipe:r}) => ({
    kcal:a.kcal+r.macros.kcal, protein:a.protein+r.macros.protein,
    carbs:a.carbs+r.macros.carbs, fat:a.fat+r.macros.fat }), {kcal:0,protein:0,carbs:0,fat:0}));
  const avg = {kcal:0,protein:0,carbs:0,fat:0};
  dailyTotals.forEach(t => Object.keys(avg).forEach(k => avg[k]+=t[k]));
  Object.keys(avg).forEach(k => avg[k]=Math.round(avg[k]/numDays));
  const over = grandTotal > s.budget;
  const storeName = STORES.find(x => x.id===s.market).name;

  app.innerHTML = `
    <div class="banner">
      <div class="l">Average per day (3 meals)</div>
      <div class="v">${avg.kcal} kcal · ${avg.protein}g protein · ${avg.carbs}g carbs · ${avg.fat}g fat</div>
    </div>

    <div class="receipt">
      <div class="head">🛒 ${storeName}</div>
      <div class="sub">Boodschappenlijst — checkjebon.nl prices</div>
      <div class="dashed">
        ${items.map(it => `<div class="rline">
          <span>${esc(it.name)} <span class="g">×${it.packs} (${it.pack})</span></span>
          <span>${fmt(it.lineTotal)}</span></div>`).join('')}
      </div>
      <div class="rtotal"><span>TOTAAL</span><span>${fmt(grandTotal)}</span></div>
      <div class="verdict ${over?'over':'ok'}">${over
        ? `⚠ Over your ${fmt(s.budget)} budget by ${fmt(grandTotal-s.budget)}. Try fewer cooking days or the Basic Healthy diet.`
        : `✓ ${fmt(s.budget-grandTotal)} under budget.`}</div>
      <div class="barcode">${'<i></i>'.repeat(40)}</div>
    </div>
    <p class="foot">${priceNote()} Macros are estimates per serving.</p>

    ${dayPlans.map(({day, meals}, di) => `
      <div class="dayhead">
        <span class="n">${day.full}</span>
        <span class="m">${dailyTotals[di].kcal} kcal · ${dailyTotals[di].protein}g protein</span>
      </div>
      ${meals.map(({meal, recipe}) => `
        <div class="mealcard">
          <div class="mealtop">
            <span class="mealtag" style="background:${meal.color};color:${meal.text}">${meal.label}</span>
            <span class="mealtime">${recipe.time}</span>
          </div>
          <div class="mealname">${esc(recipe.name)}</div>
          ${macroHTML(recipe.macros)}
          <details>
            <summary>How to make it</summary>
            <ol>${recipe.steps.map(st => `<li>${esc(st)}</li>`).join('')}</ol>
          </details>
        </div>`).join('')}
    `).join('')}

    <button class="restart" onclick="reset()">↺ Start over</button>
  `;
}

window.go = n => { state.step = n; render(); };
window.setMarket = id => { state.market = id; render(); };
window.setDiet = id => { state.diet = id; render(); };
window.toggleDay = k => {
  state.days = state.days.includes(k) ? state.days.filter(x=>x!==k) : [...state.days, k];
  render();
};
window.reset = () => { Object.assign(state, {step:0, market:null, budget:80, days:[], diet:null}); render(); };

render();
loadLivePrices();
</script>
</body>
</html>
